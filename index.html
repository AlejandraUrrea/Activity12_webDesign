<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChuckJokesVue - Task 10</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .card { margin-bottom: 20px; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div id="app" class="container">
        <h1 class="text-center mb-5">Chuck Norris Activity</h1>
        
        <div class="row">
            <div class="col-12 col-md-4" v-for="(joke, index) in chuck" :key="index">
                <chuck-card 
                    :icon="joke.icon_url" 
                    :text="joke.value">
                </chuck-card>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;

        // Definición del componente 'chuck-card'
        const ChuckCard = {
            props: ['icon', 'text'], // Recibimos icon_url y value mediante props
            template: `
                <div class="card h-100">
                    <img :src="icon" class="card-img-top p-3" alt="Chuck Norris" style="width: 100px; margin: 0 auto;">
                    <div class="card-body">
                        <p class="card-text text-center">{{ text }}</p>
                    </div>
                </div>
            `
        };

        createApp({
            components: {
                'chuck-card': ChuckCard
            },
            data() {
                return {
                    chuck: [ 
                        { "icon_url": "https://assets.chucknorris.host/img/avatar/chuck-norris.png", "value": "Chuck Norris can skydive into outer space." }, 
                        { "icon_url": "https://assets.chucknorris.host/img/avatar/chuck-norris.png", "value": "The chief export of Chuck Norris is pain." }, 
                        { "icon_url": "https://assets.chucknorris.host/img/avatar/chuck-norris.png", "value": "Chuck Norris doesn't read books. He stares them down until he gets the information he wants." }, 
                        { "icon_url": "https://assets.chucknorris.host/img/avatar/chuck-norris.png", "value": "Time waits for no man. Unless that man is Chuck Norris." }, 
                        { "icon_url": "https://assets.chucknorris.host/img/avatar/chuck-norris.png", "value": "If you spell Chuck Norris in Scrabble, you win. Forever." }
                    ]
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
